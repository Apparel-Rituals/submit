<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Prevent Cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Uniform Request Form</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      background: #f4f4f9;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    form {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #stock-display {
      font-weight: bold;
      color: green;
      margin-top: 5px;
    }

    #progressBarContainer {
      display: none;
      margin-top: 20px;
    }

    #progressOuter {
      width: 100%;
      background-color: #eee;
      border-radius: 10px;
    }

    #progressBar {
      width: 0%;
      height: 10px;
      background-color: #4caf50;
      border-radius: 10px;
      transition: width 0.3s;
    }

    #progressText {
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }

    @media (max-width: 600px) {
      form {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <h2>Uniform Request Form</h2>

  <form id="uniform-form">

    <div style="text-align:center; margin-bottom:10px;">
      <img src="https://raw.githubusercontent.com/Apparel-Rituals/uniformrequest/main/logo.png"
        alt="Logo"
        style="max-width:85px; height:auto;">
    </div>

    <label for="empCode">Employee Code:</label>
    <input type="text" id="empCode" required />

    <label for="empName">Employee Name:</label>
    <input type="text" id="empName" required />

    <label for="barcode">Uniform Barcode:</label>
    <select id="barcode" required>
      <option value="">Loading...</option>
    </select>

    <div>
      Current Stock:
      <span id="stock-display">-</span>
    </div>

    <label for="qty">Quantity:</label>
    <input type="number" id="qty" min="1" max="2" required />

    <label for="region">Region:</label>
    <select id="region" required>
      <option value="">Select Region</option>
    </select>

    <label for="store">Store:</label>
    <select id="store" required>
      <option value="">Select Store</option>
    </select>

    <button type="submit">Submit</button>

    <!-- Progress Bar -->
    <div id="progressBarContainer">

      <div id="progressOuter">
        <div id="progressBar"></div>
      </div>

      <p id="progressText">Submitting...</p>

    </div>

  </form>

  <script>

    // STOCK CSV URL
    const stockURL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vST2H4FYdTFxPnJQq04pDiTtBA_8lDyJA_Ik7eKt6uVv9XwHTRwgs7UdoDBL_LBiJ6Iq2zZc-vK1BSx/pub?gid=901085179&single=true&output=csv";

    // STORE CSV URL
    const storeSheetURL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vST2H4FYdTFxPnJQq04pDiTtBA_8lDyJA_Ik7eKt6uVv9XwHTRwgs7UdoDBL_LBiJ6Iq2zZc-vK1BSx/pub?gid=1717799572&single=true&output=csv";

    // GOOGLE APPS SCRIPT URL
    const scriptURL =
      "https://script.google.com/macros/s/AKfycbywF8zHLDEpX0TrQT4rkAjUwiTONz4W_DjfdTjWlTmd5ode0M7tDHJkTlAt25lh1f3J/exec";

    const form = document.getElementById("uniform-form");

    const barcodeSelect = document.getElementById("barcode");
    const stockDisplay = document.getElementById("stock-display");

    const regionSelect = document.getElementById("region");
    const storeSelect = document.getElementById("store");

    const progressBarContainer = document.getElementById("progressBarContainer");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    let stockData = [];
    let storeData = {};

    // LOAD STOCK
    async function loadStockCSV() {

      const res = await fetch(stockURL + "&t=" + new Date().getTime());

      const text = await res.text();

      const rows = text.trim().split("\n").map(r => r.split(","));

      const headers = rows[0].map(h => h.trim());

      const barcodeIndex = headers.indexOf("Barcode");
      const stockIndex = headers.indexOf("Stock");

      stockData = [];

      rows.slice(1).forEach(row => {

        stockData.push({
          barcode: row[barcodeIndex]?.trim(),
          stock: parseInt(row[stockIndex]) || 0
        });

      });

      barcodeSelect.innerHTML = `<option value="">Select Barcode</option>`;

      stockData.forEach(item => {

        const opt = document.createElement("option");

        opt.value = item.barcode;
        opt.textContent = item.barcode;

        barcodeSelect.appendChild(opt);

      });

    }

    // LOAD REGION & STORE
    async function loadStoreData() {

      const res = await fetch(storeSheetURL + "&t=" + new Date().getTime());

      const text = await res.text();

      const rows = text.trim().split("\n").map(r => r.split(","));

      const headers = rows[0].map(h => h.trim());

      const regionIndex = headers.indexOf("Region");
      const storeIndex = headers.indexOf("Store");

      storeData = {};

      rows.slice(1).forEach(row => {

        const region = row[regionIndex]?.trim();
        const store = row[storeIndex]?.trim();

        if (!region || !store) return;

        if (!storeData[region]) {
          storeData[region] = [];
        }

        storeData[region].push(store);

      });

      regionSelect.innerHTML = `<option value="">Select Region</option>`;

      Object.keys(storeData).forEach(region => {

        const opt = document.createElement("option");

        opt.value = region;
        opt.textContent = region;

        regionSelect.appendChild(opt);

      });

    }

    // SHOW STOCK
    barcodeSelect.addEventListener("change", () => {

      const barcode = barcodeSelect.value;

      const item = stockData.find(i => i.barcode === barcode);

      stockDisplay.textContent = item ? item.stock : "-";

    });

    // LOAD STORES
    regionSelect.addEventListener("change", () => {

      const region = regionSelect.value;

      storeSelect.innerHTML = `<option value="">Select Store</option>`;

      if (storeData[region]) {

        storeData[region].forEach(store => {

          const opt = document.createElement("option");

          opt.value = store;
          opt.textContent = store;

          storeSelect.appendChild(opt);

        });

      }

    });

    // FORM SUBMIT
    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      const barcode = barcodeSelect.value;

      const qty = parseInt(document.getElementById("qty").value);
      if (qty > 2) {
  alert("Maximum 2 Quantity Allowed.");
  return;
      const stockItem = stockData.find(i => i.barcode === barcode);

      if (!stockItem) {
        alert("Invalid Barcode");
        return;
      }

      if (qty > stockItem.stock) {
        alert("Insufficient stock or Allocation Being Processed.");
        return;
      }

      // SHOW PROGRESS
      progressBarContainer.style.display = "block";

      progressBar.style.width = "30%";

      progressText.textContent = "Submitting...";

      const payload = {

        empCode: document.getElementById("empCode").value.trim(),

        empName: document.getElementById("empName").value.trim(),

        barcode: barcode,

        qty: qty,

        region: regionSelect.value,

        store: storeSelect.value

      };

      const formData = new FormData();

      formData.append("data", JSON.stringify(payload));

      try {

        progressBar.style.width = "60%";

        const res = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        progressBar.style.width = "90%";

        const json = await res.json();

        if (json.success) {

          progressBar.style.width = "100%";

          progressText.textContent = "Submitted Successfully!";

          alert("Form submitted successfully!");

          await loadStockCSV();

          setTimeout(() => {
            window.location.reload();
          }, 1000);

        } else {

          alert("Error: " + json.message);

          progressBarContainer.style.display = "none";

        }

      } catch (err) {

        alert("Submission failed: " + err.message);

        progressBarContainer.style.display = "none";

      }

    });

    // INITIAL LOAD
    loadStockCSV();
    loadStoreData();

  </script>

</body>

</html>
